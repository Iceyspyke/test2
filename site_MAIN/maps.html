<div id="page-maps" class="page">
  <aside class="sidebar" data-autosidebar></aside>
  <div class="main">
	<div class="map-header">
	  <h2 class="map-title">Geospatial Intelligence Node</h2>
	  <div class="map-subtitle">Forced Displacement & Evacuation Orders Archive</div>
	</div>
	<div class="map-layout">
	  <div class="map-order-list" id="map-order-list">
		<div style="padding: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase;">
		  Initializing API Connection...<br>
		  <span class="status-pulse red" style="margin-top:8px;"></span> Awaiting Data
		</div>
	  </div>
	  
	  <div class="map-viewer">
	  <div class="map-grid-bg"></div>
	  <img id="active-map-img" src="" style="max-width:100%; max-height:100%; object-fit:contain; position:relative; z-index:2; display:none; filter: grayscale(0.2) contrast(1.1);" />
	  
	  <div class="map-ui-overlay" style="z-index:10;">
		  <div class="map-ui-title" id="map-ui-title">Awaiting Selection</div>
		  <div class="map-data-row">
			<span class="map-data-label">DATE EXECUTED</span>
			<span class="map-data-val" id="map-val-date">--</span>
		  </div>
		  <div class="map-data-row">
			<span class="map-data-label">DISPLACEMENT</span>
			<span class="map-data-val red" id="map-val-disp-area">-- sq km</span>
		  </div>
		  <div class="map-data-row">
			<span class="map-data-label">"SAFE" ZONE</span>
			<span class="map-data-val" id="map-val-safe-area" style="color:var(--green-light)">-- sq km</span>
		  </div>
		  <div class="map-data-row" style="flex-direction:column; gap:8px; margin-top:16px;">
			<span class="map-data-label">AFFECTED BLOCKS</span>
			<span class="map-data-val" id="map-val-blocks" style="font-size:8px; line-height:1.4; white-space:normal; word-wrap:break-word; max-height:80px; overflow-y:auto;">--</span>
		  </div>
		  
		  <div style="margin-top: 24px; display:flex; gap:8px;">
			 <a id="map-btn-idf" href="#" target="_blank" class="btn-outline" style="font-size:8px; padding:8px; flex:1; text-align:center; border-color:rgba(255,255,255,0.3); display:none;">IDF Post</a>
			 <a id="map-btn-full" href="#" target="_blank" class="btn-primary" style="font-size:8px; padding:8px; flex:1; text-align:center; display:none;">HD Map</a>
		  </div>
		</div>
	  </div>
	</div>
  </div>
</div>
