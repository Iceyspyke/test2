<div id="page-registry" class="page">
  <aside class="sidebar" data-autosidebar></aside>
  <div class="main">
	<div class="un-header">
	  <h1 class="un-title">Archive Registry</h1>
	  <div class="un-subtitle">Consolidated Resource Index // Cultural & Humanitarian</div>
	  <p class="hr-header-text" style="margin-top: 16px;">A centralized ledger of Palestinian literature, cinema, and international advocacy organizations. Data retrieved via unified API handshake.</p>
	</div>

	<div class="timeline-filters" style="margin-bottom: 32px; grid-template-columns: repeat(3, 1fr);">
	  <button class="btn-outline active" id="btn-reg-orgs" onclick="fetchRegistryData('organizations', this)">Organizations</button>
	  <button class="btn-outline" id="btn-reg-books" onclick="fetchRegistryData('books', this)">Literature</button>
	  <button class="btn-outline" id="btn-reg-movies" onclick="fetchRegistryData('movies', this)">Cinema</button>
	</div>

	<div id="registry-api-container">
	  <div style="padding: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase;">
		<span class="status-pulse red"></span> Initializing Handshake...
	  </div>
	</div>

	<footer></footer>
  </div>
</div>
